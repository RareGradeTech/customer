<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vynix Eats | Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --accent: #06C167;
            --text: #1a1d23; --dim: #6c757d; --radius: 20px; --radius-sm: 12px;
            --error: #ff4d4d;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.5; min-height: 100dvh; padding-bottom: 40px;
        }
        .payment-container { max-width: 560px; margin: 0 auto; padding: 20px 16px; }
        
        /* Header */
        .header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
        .back-btn {
            width: 42px; height: 42px; border-radius: 12px;
            background: white; display: flex; align-items: center;
            justify-content: center; cursor: pointer; border: 1px solid #eee;
        }

        /* Card Styles */
        .card {
            background: white; border-radius: var(--radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            padding: 20px; margin-bottom: 16px; border: 1px solid #f0f0f0;
        }
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        /* Order Items */
        .order-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .divider { height: 1px; background: #eee; margin: 12px 0; }
        .total-row { display: flex; justify-content: space-between; font-weight: 800; font-size: 1.2rem; color: var(--accent); }

        /* Payment Option UI */
        .payment-option {
            border: 2px solid #eee; padding: 14px; border-radius: var(--radius-sm);
            margin-bottom: 10px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 12px;
        }
        .payment-option.active { border-color: var(--accent); background: #f0fff4; }

        /* Button & Animation */
        .pay-button {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 18px; border-radius: var(--radius-sm);
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            transition: transform 0.1s active; margin-top: 10px;
        }
        .pay-button:active { transform: scale(0.98); }

        /* Processing Overlay */
        #overlay {
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; text-align: center;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <h2 style="font-weight: 800;">Processing Order...</h2>
    <p style="color: var(--dim);">Please don't close the app</p>
</div>

<div class="payment-container">
    <div class="header">
        <div class="back-btn" onclick="window.history.back()">
            <i data-lucide="chevron-left"></i>
        </div>
        <h2 style="font-weight:800;">Checkout</h2>
    </div>

    <div class="card">
        <div class="section-title"><i data-lucide="map-pin" size="18"></i> Delivery Address</div>
        <p id="addressDisplay" style="font-weight: 500;">123 Innovation Drive, Tech Park</p>
        <p style="font-size: 0.85rem; color: var(--dim);">Estimated delivery: 25-35 mins</p>
    </div>

    <div class="card">
        <div class="section-title"><i data-lucide="shopping-bag" size="18"></i> Order Summary</div>
        <div id="orderItems">
            </div>
        <div class="divider"></div>
        <div class="total-row">
            <span>Total to Pay</span>
            <span id="finalTotal">R 0.00</span>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><i data-lucide="credit-card" size="18"></i> Payment Method</div>
        
        <div class="payment-option active" onclick="selectPayment('cod')">
            <i data-lucide="banknote" class="text-accent"></i>
            <div style="flex:1">
                <p style="font-weight:700;">Cash on Delivery</p>
                <p style="font-size:0.8rem; color:var(--dim);">Pay when your food arrives</p>
            </div>
            <i data-lucide="check-circle-2" style="color:var(--accent)"></i>
        </div>

        <div class="payment-option" style="opacity: 0.6; cursor: not-allowed;">
            <i data-lucide="credit-card"></i>
            <div style="flex:1">
                <p style="font-weight:700;">Card (Coming Soon)</p>
                <p style="font-size:0.8rem; color:var(--dim);">Secure online payment</p>
            </div>
        </div>
    </div>

    <button class="pay-button" onclick="completePayment()">
        Confirm Order • <span id="btnTotal">R 0.00</span>
    </button>
</div>

<script>
    // 1. Mock Data (In a real app, this comes from localStorage or a URL param)
    const cartData = {
        items: [
            { name: "Double Cheese Burger", price: 85.00, qty: 1 },
            { name: "Large Fries", price: 35.00, qty: 1 },
            { name: "Coca-Cola 330ml", price: 20.00, qty: 2 }
        ],
        deliveryFee: 15.00
    };

    // 2. Initialize Page
    function init() {
        lucide.createIcons();
        renderOrder();
    }

    function renderOrder() {
        const itemsContainer = document.getElementById('orderItems');
        let subtotal = 0;

        itemsContainer.innerHTML = cartData.items.map(item => {
            subtotal += (item.price * item.qty);
            return `
                <div class="order-item">
                    <span>${item.qty}x ${item.name}</span>
                    <span>R ${ (item.price * item.qty).toFixed(2) }</span>
                </div>
            `;
        }).join('');

        const total = subtotal + cartData.deliveryFee;
        document.getElementById('finalTotal').innerText = `R ${total.toFixed(2)}`;
        document.getElementById('btnTotal').innerText = `R ${total.toFixed(2)}`;
    }

    // 3. Payment Logic
    function completePayment() {
        // Show loading overlay
        document.getElementById('overlay').style.display = 'flex';

        // Simulate API Call
        setTimeout(() => {
            document.getElementById('overlay').innerHTML = `
                <i data-lucide="check-circle" style="width:60px; height:60px; color:var(--accent); margin-bottom:15px;"></i>
                <h2 style="font-weight:800;">Order Confirmed!</h2>
                <p style="padding: 10px 40px; color:var(--dim);">Your food is being prepared. Redirecting to tracker...</p>
            `;
            lucide.createIcons();
            
            // Redirect after 2.5 seconds
            setTimeout(() => {
                alert("Redirecting to Order Tracking Page...");
                window.location.href = "index.html"; // Change to your home or tracking page
            }, 2500);

        }, 2000);
    }

    function selectPayment(type) {
        // Since only COD is functional for now, we just keep the UI visual
        console.log("Selected payment type:", type);
    }

    window.onload = init;
</script>

</body>
</html>
