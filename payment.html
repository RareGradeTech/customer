<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vynix Eats | Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --accent: #06C167;
            --text: #1a1d23; --dim: #6c757d; --radius: 24px; --radius-sm: 14px;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            line-height: 1.5; min-height: 100dvh;
            overflow-x: hidden; padding-bottom: 100px;
        }
        .payment-container { max-width: 500px; margin: 0 auto; padding: 20px 16px; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; align-items: center; gap: 12px; padding: 10px 0 20px; }
        .back-btn {
            width: 45px; height: 45px; border-radius: 15px;
            background: white; display: flex; align-items: center;
            justify-content: center; cursor: pointer; box-shadow: var(--shadow);
        }

        .card {
            background: white; border-radius: var(--radius);
            box-shadow: var(--shadow); padding: 24px; margin-bottom: 16px;
            border: 1px solid rgba(0,0,0,0.02); transition: all 0.3s ease;
        }

        /* Editable Address Section */
        .address-box { display: flex; flex-direction: column; gap: 8px; }
        .address-input {
            border: 1px solid #eee; padding: 12px; border-radius: 10px;
            font-family: inherit; font-size: 0.95rem; width: 100%;
            outline: none; transition: border-color 0.3s;
        }
        .address-input:focus { border-color: var(--accent); }
        .location-btn { 
            color: var(--accent); font-size: 0.85rem; font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        /* Payment Options */
        .payment-method {
            border: 2px solid #f1f3f5; padding: 16px; border-radius: var(--radius-sm);
            margin-bottom: 12px; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 12px; position: relative;
        }
        .payment-method.active { border-color: var(--accent); background: #f0fff4; }
        
        .card-fields { 
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease;
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;
        }
        .payment-method.active .card-fields { max-height: 250px; margin-top: 15px; }
        
        input.field {
            padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            font-size: 0.9rem; outline: none; width: 100%;
        }
        .full-width { grid-column: span 2; }

        /* Order Summary */
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .total-text { font-size: 1.3rem; font-weight: 800; color: var(--accent); }

        /* Button */
        .confirm-btn {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 32px); max-width: 468px;
            background: var(--accent); color: white; border: none;
            padding: 20px; border-radius: var(--radius-sm);
            font-weight: 800; font-size: 1.1rem; cursor: pointer;
            box-shadow: 0 10px 25px rgba(6, 193, 103, 0.3);
            display: flex; justify-content: center; align-items: center; gap: 10px;
            z-index: 100;
        }
        .confirm-btn:active { transform: translateX(-50%) scale(0.97); }

        /* Overlay */
        #statusOverlay {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: none; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; padding: 20px;
        }
        .loader {
            width: 48px; height: 48px; border: 5px solid #FFF;
            border-bottom-color: var(--accent); border-radius: 50%;
            display: inline-block; animation: rotation 1s linear infinite;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="statusOverlay">
    <div id="loader" class="loader"></div>
    <div id="successIcon" style="display:none; color: var(--accent);">
        <i data-lucide="check-circle" style="width:80px; height:80px;"></i>
    </div>
    <h2 id="statusTitle" style="margin-top:20px; font-weight:800;">Processing...</h2>
    <p id="statusMsg" style="color:var(--dim);">Securely verifying your details</p>
</div>

<div class="payment-container">
    <div class="header">
        <div class="back-btn" onclick="window.history.back()">
            <i data-lucide="arrow-left"></i>
        </div>
        <h2 style="font-weight:800;">Secure Checkout</h2>
    </div>

    <div class="card">
        <div class="address-box">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:800; font-size:1.1rem;">Delivery Address</span>
                <div class="location-btn" onclick="getLocation()">
                    <i data-lucide="navigation" size="14"></i> Get Current
                </div>
            </div>
            <input type="text" id="addressInput" class="address-input" placeholder="Fetching location..." value="Detecting your location...">
        </div>
    </div>

    <div class="card" id="orderSummary">
        <div class="summary-row"><span>Cart Subtotal</span><span>R 140.00</span></div>
        <div class="summary-row"><span>Delivery Fee</span><span>R 15.00</span></div>
        <div style="height:1px; background:#eee; margin:15px 0;"></div>
        <div class="summary-row">
            <span style="font-weight:700;">Total</span>
            <span class="total-text">R 155.00</span>
        </div>
    </div>

    <div class="card">
        <h3 style="margin-bottom:16px; font-weight:800;">Payment Method</h3>
        
        <div class="payment-method active" id="method-cod" onclick="switchMethod('cod')">
            <i data-lucide="banknote" style="color:var(--accent)"></i>
            <div style="flex:1;"><p style="font-weight:700;">Cash on Delivery</p></div>
            <i data-lucide="circle" id="check-cod" style="color:#eee;"></i>
        </div>

        <div class="payment-method" id="method-card" onclick="switchMethod('card')">
            <i data-lucide="credit-card" style="color:#6c757d"></i>
            <div style="flex:1;">
                <p style="font-weight:700;">Credit / Debit Card</p>
                <div class="card-fields" onclick="event.stopPropagation()">
                    <input type="text" placeholder="Card Number" class="field full-width" maxlength="19" id="cardNumber">
                    <input type="text" placeholder="MM/YY" class="field" maxlength="5">
                    <input type="password" placeholder="CVV" class="field" maxlength="3">
                </div>
            </div>
            <i data-lucide="circle" id="check-card" style="color:#eee;"></i>
        </div>
    </div>

    <button class="confirm-btn" onclick="completePayment()">
        Place Order • R 155.00
    </button>
</div>

<script>
    let selectedMethod = 'cod';

    function init() {
        lucide.createIcons();
        updateCheckmarks();
        getLocation(); // Auto-start location fetch
    }

    // 1. Geolocation Logic
    function getLocation() {
        const input = document.getElementById('addressInput');
        input.value = "Locating you...";
        
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                try {
                    // Using Reverse Geocoding API (OpenStreetMap - Free)
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await res.json();
                    input.value = data.display_name || `${latitude}, ${longitude}`;
                } catch (e) {
                    input.value = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                }
            }, () => {
                input.value = "Location denied. Please type address.";
            });
        }
    }

    // 2. UI Transitions
    function switchMethod(method) {
        selectedMethod = method;
        document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('active'));
        document.getElementById(`method-${method}`).classList.add('active');
        updateCheckmarks();
    }

    function updateCheckmarks() {
        const codCheck = document.getElementById('check-cod');
        const cardCheck = document.getElementById('check-card');
        
        if (selectedMethod === 'cod') {
            codCheck.setAttribute('data-lucide', 'check-circle-2');
            codCheck.style.color = 'var(--accent)';
            cardCheck.setAttribute('data-lucide', 'circle');
            cardCheck.style.color = '#eee';
        } else {
            cardCheck.setAttribute('data-lucide', 'check-circle-2');
            cardCheck.style.color = 'var(--accent)';
            codCheck.setAttribute('data-lucide', 'circle');
            codCheck.style.color = '#eee';
        }
        lucide.createIcons();
    }

    // 3. Card Validation & Formatting
    document.getElementById('cardNumber').addEventListener('input', function (e) {
        let v = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        let matches = v.match(/\d{4,16}/g);
        let match = matches && matches[0] || '';
        let parts = [];
        for (let i=0, len=match.length; i<len; i+=4) parts.push(match.substring(i, i+4));
        if (parts.length) e.target.value = parts.join(' ');
        else e.target.value = v;
    });

    // 4. Final Payment Execution
    function completePayment() {
        const overlay = document.getElementById('statusOverlay');
        const loader = document.getElementById('loader');
        const successIcon = document.getElementById('successIcon');
        const title = document.getElementById('statusTitle');
        const msg = document.getElementById('statusMsg');

        // Basic validation
        if (selectedMethod === 'card' && document.getElementById('cardNumber').value.length < 16) {
            alert("Please enter a valid card number");
            return;
        }

        overlay.style.display = 'flex';

        // Simulate Bank/Server response
        setTimeout(() => {
            loader.style.display = 'none';
            successIcon.style.display = 'block';
            title.innerText = "Order Placed!";
            msg.innerText = "Redirecting to track your meal...";
            lucide.createIcons();

            setTimeout(() => {
                window.location.href = "#"; // Replace with tracking page
            }, 3000);
        }, 2500);
    }

    window.onload = init;
</script>

</body>
</html>
