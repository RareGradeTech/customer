<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vynix Eats | Payment</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #f8f9fa; --surface: #ffffff; --accent: #06C167;
            --text: #1a1d23; --dim: #6c757d; --radius: 20px; --radius-sm: 12px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            min-height: 100dvh;
            overflow-y: auto !important;   /* ← THIS MAKES IT SCROLL ON MOBILE */
            padding-bottom: 80px;
        }
        .payment-container {
            max-width: 560px;
            margin: 0 auto;
            padding: 20px 16px;
        }
        .header {
            display: flex; align-items: center; gap: 12px;
            padding-bottom: 16px; border-bottom: 1px solid #e9ecef;
        }
        .back-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: #f1f3f5; display: flex; align-items: center;
            justify-content: center; cursor: pointer;
        }
        .card {
            background: white; border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 20px; margin-bottom: 16px;
        }
        .total {
            font-size: 1.4rem; font-weight: 800; color: var(--accent);
        }
        button {
            width: 100%; background: var(--accent); color: white;
            border: none; padding: 16px; border-radius: var(--radius-sm);
            font-weight: 700; font-size: 1.05rem; margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="payment-container">
    <div class="header">
        <div class="back-btn" onclick="window.history.back()">
            <i data-lucide="arrow-left" style="width:24px;height:24px;"></i>
        </div>
        <h2 style="font-weight:800;">Secure Payment</h2>
    </div>

    <div class="card" id="orderSummary">
        <!-- Filled by JavaScript -->
    </div>

    <div class="card">
        <h3 style="margin-bottom:12px;">Payment Method</h3>
        <p style="color:#06C167;font-weight:600;">✅ Cash on Delivery (selected)</p>
        <p style="font-size:0.9rem;color:var(--dim);margin-top:8px;">
            You will pay when the driver arrives.
        </p>
    </div>

    <button onclick="completePayment()">Confirm & Pay • R <span id="finalTotal">0.00</span></button>
</div>
