<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#06C167">
<title>Vynix Eats | Checkout</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
/* ── FULL STYLE COPIED FROM MAIN APP (only checkout-relevant parts kept for brevity, but everything is preserved) ── */
:root{--bg:#f8f9fa;--surface:#ffffff;--surface2:#f1f3f5;--border:#e9ecef;--border-light:#f0f0f0;--text:#1a1d23;--text-secondary:#4a4a4a;--dim:#6c757d;--accent:#06C167;--accent-dark:#05a357;--accent-light:#e8f8ef;--yellow:#ffc107;--danger:#ff3b30;--heart:#ff2d55;--radius:20px;--radius-sm:12px;--radius-xs:6px;--radius-pill:100px;--shadow:0 4px 20px rgba(0,0,0,0.08);--shadow-lg:0 10px 40px rgba(0,0,0,0.12);--transition:all .25s cubic-bezier(.4,0,.2,1);--transition-slow:all .4s cubic-bezier(.32,.72,0,1);--safe-bottom:env(safe-area-inset-bottom,0px);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;overflow:hidden;-webkit-font-smoothing:antialiased}
@keyframes successPop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes coStepSlideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes coStepSlideBack{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.co-header{padding:13px 15px;background:var(--surface);border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:9px;flex-shrink:0}
.co-back-btn{width:30px;height:30px;border-radius:50%;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--dim);transition:var(--transition);flex-shrink:0}
.co-back-btn:hover{background:var(--border);transform:translateX(-2px)}
.co-back-btn i{width:15px;height:15px}
.co-header-title{font-weight:800;font-size:.95rem;flex:1}
.co-step-pills{display:flex;align-items:center;gap:4px}
.co-step-pill{width:5px;height:5px;border-radius:50%;background:var(--border);transition:var(--transition)}
.co-step-pill.active{background:var(--accent);width:16px;border-radius:3px}
.co-step-pill.done{background:var(--accent-dark)}
.co-body{flex:1;overflow-y:auto;padding:13px;display:flex;flex-direction:column;gap:11px}
.co-body::-webkit-scrollbar{display:none}
.co-body.step-enter{animation:coStepSlideIn .28s cubic-bezier(.4,0,.2,1)}
.co-body.step-enter-back{animation:coStepSlideBack .28s cubic-bezier(.4,0,.2,1)}
.co-card{background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border-light);overflow:hidden;box-shadow:var(--shadow)}
.co-card-header{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--border-light);background:var(--surface)}
.co-card-icon{width:28px;height:28px;border-radius:7px;background:var(--accent-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.co-card-icon i{width:13px;height:13px;color:var(--accent-dark)}
.co-card-label{font-size:.79rem;font-weight:700;color:var(--text);flex:1}
.co-card-edit{font-size:.7rem;font-weight:600;color:var(--accent);cursor:pointer;transition:var(--transition);padding:4px 8px;border-radius:6px}
.co-card-edit:hover{background:var(--accent-light)}
.co-card-body{padding:11px 13px}
.co-addr-input{width:100%;margin-top:10px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-xs);font-family:inherit;font-size:.82rem;background:var(--surface2);outline:none;transition:var(--transition);display:none}
.co-addr-input:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 2px rgba(6,193,103,.1)}
.co-order-item{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--border-light)}
.co-order-item:last-child{border-bottom:none}
.co-order-img{width:36px;height:36px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--surface2);border:1px solid var(--border-light)}
.co-order-no-img{width:36px;height:36px;border-radius:5px;background:var(--surface2);border:1px solid var(--border-light);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.co-order-no-img i{width:13px;height:13px;color:#ccc}
.co-order-name{font-size:.75rem;font-weight:600;flex:1;color:var(--text);line-height:1.3}
.co-order-qty{font-size:.69rem;color:var(--dim)}
.co-order-price{font-size:.75rem;font-weight:700;color:var(--text);white-space:nowrap}
.co-vendor-block{margin-bottom:9px}
.co-vendor-label{display:flex;align-items:center;gap:7px;font-size:.69rem;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.co-address-row{display:flex;align-items:flex-start;gap:9px;padding:3px 0}
.co-address-icon{color:var(--accent);flex-shrink:0;margin-top:1px}
.co-address-icon i{width:15px;height:15px}
.co-address-main{font-size:.81rem;font-weight:600;color:var(--text);line-height:1.4}
.co-address-sub{font-size:.69rem;color:var(--dim);margin-top:2px}
.co-payment-options{display:flex;flex-direction:column;gap:7px}
.co-pay-option{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:var(--radius-xs);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:var(--transition)}
.co-pay-option:hover{border-color:var(--accent);transform:translateX(4px)}
.co-pay-option.selected{border-color:var(--accent);background:var(--accent-light)}
.co-pay-option:active{transform:scale(.98)}
.co-pay-icon{width:30px;height:30px;border-radius:7px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.co-pay-option.selected .co-pay-icon{background:rgba(6,193,103,.15)}
.co-pay-icon i{width:14px;height:14px;color:var(--dim)}
.co-pay-option.selected .co-pay-icon i{color:var(--accent-dark)}
.co-pay-info{flex:1}
.co-pay-name{font-size:.79rem;font-weight:700;color:var(--text)}
.co-pay-sub{font-size:.65rem;color:var(--dim);margin-top:1px}
.co-pay-check{width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.co-pay-option.selected .co-pay-check{background:var(--accent);border-color:var(--accent)}
.co-pay-option.selected .co-pay-check::after{content:"";display:block;width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(0,-1px)}
.co-price-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.75rem;color:var(--text-secondary)}
.co-price-row.total{font-size:.88rem;font-weight:800;color:var(--text);padding-top:7px;border-top:1px solid var(--border);margin-top:3px}
.co-eta-badge{display:inline-flex;align-items:center;gap:5px;background:var(--accent-light);color:var(--accent-dark);padding:5px 11px;border-radius:100px;font-size:.72rem;font-weight:700}
.co-terms{font-size:.65rem;color:var(--dim);text-align:center;line-height:1.5;padding:3px 0}
.co-confirm-btn{width:100%;background:var(--accent);color:white;border:none;padding:13px;border-radius:var(--radius-xs);font-family:inherit;font-weight:800;font-size:.92rem;cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center;gap:7px}
.co-confirm-btn:hover{background:var(--accent-dark);transform:translateY(-2px);box-shadow:0 4px 16px rgba(6,193,103,.3)}
.co-confirm-btn:active{transform:scale(.98)}
.co-confirm-btn:disabled{background:var(--border);cursor:not-allowed;color:var(--dim);transform:none;box-shadow:none}
.co-success{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px 18px;text-align:center;animation:fadeIn .4s ease}
.co-success-ring{width:74px;height:74px;border-radius:50%;background:var(--accent-light);display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.co-success-ring i{width:33px;height:33px;color:var(--accent);animation:successPop .5s cubic-bezier(.34,1.26,.64,1) forwards}
.co-success-title{font-size:1.2rem;font-weight:800;color:var(--text);margin-bottom:5px;letter-spacing:-.02em}
.co-success-sub{font-size:.82rem;color:var(--dim);line-height:1.6;margin-bottom:18px}
.co-success-id{font-size:.7rem;color:var(--dim);margin-bottom:22px;font-family:monospace;background:var(--surface2);padding:4px 9px;border-radius:6px}
.co-success-items{width:100%;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border-light);overflow:hidden;margin-bottom:14px}
.co-success-item-row{display:flex;justify-content:space-between;padding:8px 13px;font-size:.75rem;border-bottom:1px solid var(--border-light)}
.co-success-item-row:last-child{border-bottom:none}
.co-success-item-name{font-weight:600;color:var(--text)}
.co-success-item-price{color:var(--dim)}
.co-track-btn{width:100%;background:var(--accent);color:white;border:none;padding:13px;border-radius:var(--radius-xs);font-family:inherit;font-weight:800;font-size:.92rem;cursor:pointer;transition:var(--transition)}
.co-track-btn:hover{background:var(--accent-dark);transform:translateY(-2px);box-shadow:0 4px 16px rgba(6,193,103,.3)}
.co-footer{padding:11px 13px;padding-bottom:calc(11px + var(--safe-bottom));background:var(--surface);border-top:1px solid var(--border-light);flex-shrink:0;display:flex;flex-direction:column;gap:7px}
</style>
</head>
<body style="margin:0;padding:0;background:var(--bg);height:100dvh;display:flex;flex-direction:column">

<!-- CHECKOUT FULL PAGE -->
<div style="flex:1;display:flex;flex-direction:column;height:100dvh;background:var(--bg)">
  <div class="co-header">
    <button class="co-back-btn" onclick="history.back()"><i data-lucide="arrow-left"></i></button>
    <span class="co-header-title" id="coHeaderTitle">Review Order</span>
    <div class="co-step-pills" id="coStepPills">
      <div class="co-step-pill active" id="coPill0"></div>
      <div class="co-step-pill" id="coPill1"></div>
      <div class="co-step-pill" id="coPill2"></div>
    </div>
  </div>

  <div class="co-body" id="coBody"></div>

  <div class="co-footer" id="coFooter"></div>
</div>

<script>
// ── DEMO CART DATA (self-contained) ──
let coStep = 0;
let selectedPayment = 'cash';
let coDeliveryAddress = null;
let coAnimDir = 'forward';

// Demo cart (multi-vendor to show all features)
const demoCartGroups = {
  "v1": {
    vendorId: "v1",
    vendorName: "Pizza Palace",
    vendorImage: "https://picsum.photos/id/1015/300/300",
    deliveryFee: 25,
    items: [
      {name: "Margherita Pizza", price: 89, quantity: 2, imageURL: "https://picsum.photos/id/201/80/80"},
      {name: "Garlic Bread", price: 35, quantity: 1, imageURL: "https://picsum.photos/id/292/80/80"}
    ]
  },
  "v2": {
    vendorId: "v2",
    vendorName: "Burger Haven",
    vendorImage: "https://picsum.photos/id/870/300/300",
    deliveryFee: 18,
    items: [
      {name: "Classic Cheeseburger", price: 75, quantity: 1, imageURL: "https://picsum.photos/id/312/80/80"}
    ]
  }
};

function getTotalItems(){return Object.values(demoCartGroups).reduce((s,g)=>s+(g.items||[]).reduce((ss,i)=>ss+i.quantity,0),0)}
function getTotalPrice(){return Object.values(demoCartGroups).reduce((s,g)=>{const sub=(g.items||[]).reduce((ss,i)=>ss+i.price*i.quantity,0);return s+sub+parseFloat(g.deliveryFee||0)},0)}

function animateCoBody(){
  const body=document.getElementById('coBody');
  body.classList.remove('step-enter','step-enter-back');
  void body.offsetWidth;
  body.classList.add(coAnimDir==='back'?'step-enter-back':'step-enter');
  setTimeout(()=>body.classList.remove('step-enter','step-enter-back'),350);
}

function generateOrderNumber(){
  const ts=Date.now().toString(36).toUpperCase();
  const rand=Math.random().toString(36).substring(2,5).toUpperCase();
  return `VYX-${ts}-${rand}`;
}

function renderCoStep(){
  const body=document.getElementById('coBody'), footer=document.getElementById('coFooter');
  const titles=['Review Order','Payment & Delivery','Order Placed!'];
  document.getElementById('coHeaderTitle').textContent=titles[coStep];
  for(let i=0;i<3;i++){
    const p=document.getElementById(`coPill${i}`);
    if(p){p.className='co-step-pill';if(i<coStep)p.classList.add('done');else if(i===coStep)p.classList.add('active');}
  }
  animateCoBody();
  if(coStep===0) renderCoReview(body,footer);
  else if(coStep===1) renderCoPayment(body,footer);
  else renderCoSuccess(body,footer);
}

function renderCoReview(body,footer){
  const ts=Object.values(demoCartGroups).reduce((s,g)=>s+(g.items||[]).reduce((ss,i)=>ss+i.price*i.quantity,0),0);
  const tf=Object.values(demoCartGroups).reduce((s,g)=>s+parseFloat(g.deliveryFee||0),0);
  const total=ts+tf,totalItems=getTotalItems(),vc=Object.keys(demoCartGroups).length;
  let vbs='';
  Object.entries(demoCartGroups).forEach(([gVid,group])=>{
    const imgH=group.vendorImage?`<img src="${group.vendorImage}" style="width:18px;height:18px;border-radius:4px;object-fit:cover;">`:`<i data-lucide="store" style="width:14px;height:14px;"></i>`;
    const items=(group.items||[]).map(item=>{const img=item.imageURL?`<img class="co-order-img" src="${item.imageURL}" alt="${item.name}">`:`<div class="co-order-no-img"><i data-lucide="image"></i></div>`;return`<div class="co-order-item">${img}<span class="co-order-name">${item.name}</span><span class="co-order-qty">×${item.quantity}</span><span class="co-order-price">R${(item.price*item.quantity).toFixed(2)}</span></div>`;}).join('');
    const gs=(group.items||[]).reduce((s,i)=>s+i.price*i.quantity,0),fee=parseFloat(group.deliveryFee||0);
    vbs+=`<div class="co-vendor-block"><div class="co-vendor-label">${imgH}<span>${group.vendorName}</span></div>${items}<div style="display:flex;justify-content:space-between;padding:6px 0 2px;font-size:0.72rem;color:var(--dim);"><span>Subtotal</span><span>R${gs.toFixed(2)}</span></div><div style="display:flex;justify-content:space-between;padding:2px 0;font-size:0.72rem;color:var(--dim);"><span>Delivery</span><span>${fee>0?`R${fee.toFixed(2)}`:'Free'}</span></div></div>`;
  });
  body.innerHTML=`
    ${vc>1?`<div style="background:#fff8e1;border:1px solid #ffe082;border-radius:var(--radius-xs);padding:9px 12px;font-size:0.74rem;font-weight:600;color:#7a5800;display:flex;gap:7px;align-items:flex-start;"><i data-lucide="alert-triangle" style="width:13px;height:13px;flex-shrink:0;margin-top:1px;color:#f59e0b;"></i><span>${vc} restaurants · ${vc} separate orders will be placed</span></div>`:''}
    <div class="co-card"><div class="co-card-header"><div class="co-card-icon"><i data-lucide="shopping-bag"></i></div><span class="co-card-label">Order Items (${totalItems})</span></div><div class="co-card-body">${vbs}</div></div>
    <div class="co-card"><div class="co-card-header"><div class="co-card-icon"><i data-lucide="receipt"></i></div><span class="co-card-label">Price Breakdown</span></div><div class="co-card-body"><div class="co-price-row"><span>Subtotal</span><span>R${ts.toFixed(2)}</span></div><div class="co-price-row"><span>Delivery fee${vc>1?'s':''}</span><span>${tf>0?`R ${tf.toFixed(2)}`:'Free'}</span></div><div class="co-price-row total"><span>Total</span><span>R${total.toFixed(2)}</span></div></div></div>
  `;
  footer.innerHTML=`<button class="co-confirm-btn" onclick="coGoNext()"><i data-lucide="arrow-right"></i> Continue to Payment</button>`;
}

window.coGoNext = ()=>{coAnimDir='forward';coStep=1;renderCoStep();lucide.createIcons();};

function renderCoPayment(body,footer){
  const ts=Object.values(demoCartGroups).reduce((s,g)=>s+(g.items||[]).reduce((ss,i)=>ss+i.price*i.quantity,0),0);
  const tf=Object.values(demoCartGroups).reduce((s,g)=>s+parseFloat(g.deliveryFee||0),0),total=ts+tf;
  const pays=[{id:'cash',icon:'banknote',name:'Cash on Delivery',sub:'Pay when your order arrives'},{id:'card',icon:'credit-card',name:'Card on Delivery',sub:'Swipe or tap at the door'},{id:'wallet',icon:'smartphone',name:'Digital Wallet',sub:'SnapScan, Ozow & more'}];
  const defaultAddr=coDeliveryAddress||"123 Example Street, Johannesburg";
  const addrH=`<div class="co-address-row"><div class="co-address-icon"><i data-lucide="map-pin"></i></div><div class="co-address-text"><div class="co-address-main" id="coAddrMain">${defaultAddr}</div><div class="co-address-sub">Delivery to this address</div></div></div><input type="text" class="co-addr-input" id="coAddrInput" placeholder="Enter delivery address…" value="${defaultAddr}" oninput="coDeliveryAddress=this.value;const m=document.getElementById('coAddrMain');if(m)m.textContent=this.value||'Enter delivery address below'">`;
  body.innerHTML=`
    <div class="co-card"><div class="co-card-header"><div class="co-card-icon"><i data-lucide="map-pin"></i></div><span class="co-card-label">Delivery Address</span><span class="co-card-edit" id="coAddrEditBtn">Change</span></div><div class="co-card-body">${addrH}</div></div>
    <div class="co-card"><div class="co-card-header"><div class="co-card-icon"><i data-lucide="credit-card"></i></div><span class="co-card-label">Payment Method</span></div><div class="co-card-body"><div class="co-payment-options" id="coPayOptions">${pays.map(p=>`<div class="co-pay-option ${selectedPayment===p.id?'selected':''}" onclick="selectPayment('${p.id}')"><div class="co-pay-icon"><i data-lucide="${p.icon}"></i></div><div class="co-pay-info"><div class="co-pay-name">${p.name}</div><div class="co-pay-sub">${p.sub}</div></div><div class="co-pay-check"></div></div>`).join('')}</div></div></div>
    <div class="co-card"><div class="co-card-header"><div class="co-card-icon"><i data-lucide="receipt"></i></div><span class="co-card-label">Order Total</span></div><div class="co-card-body"><div class="co-price-row"><span>Subtotal</span><span>R${ts.toFixed(2)}</span></div><div class="co-price-row"><span>Delivery fee${Object.keys(demoCartGroups).length>1?'s':''}</span><span>${tf>0?`R ${tf.toFixed(2)}`:'Free'}</span></div><div class="co-price-row total"><span>Total</span><span>R${total.toFixed(2)}</span></div></div></div>
    <p class="co-terms">By placing your order you agree to our Terms of Service and Privacy Policy.</p>
  `;
  footer.innerHTML=`<button class="co-confirm-btn" id="coPlaceBtn" onclick="handleCheckout()"><i data-lucide="check-circle"></i> Place Order · R${total.toFixed(2)}</button>`;
  const eb=document.getElementById('coAddrEditBtn');
  if(eb)eb.addEventListener('click',()=>{const inp=document.getElementById('coAddrInput');if(inp){const isHidden=inp.style.display==='none'||!inp.style.display;inp.style.display=isHidden?'block':'none';if(isHidden)inp.focus();}});
}

window.selectPayment = id=>{selectedPayment=id;document.querySelectorAll('.co-pay-option').forEach(el=>el.classList.toggle('selected',el.getAttribute('onclick').includes(`'${id}'`)));lucide.createIcons();};

function renderCoSuccess(body,footer){
  const total=getTotalPrice(),vc=Object.keys(demoCartGroups).length||1;
  const allItems=Object.values(demoCartGroups).flatMap(g=>g.items||[]);
  const orderId=generateOrderNumber();
  const rows=allItems.slice(0,6).map(i=>`<div class="co-success-item-row"><span class="co-success-item-name">${i.name} ×${i.quantity}</span><span class="co-success-item-price">R${(i.price*i.quantity).toFixed(2)}</span></div>`).join('');
  body.innerHTML=`<div class="co-success">
    <div class="co-success-ring"><i data-lucide="check"></i></div>
    <div class="co-success-title">Order Confirmed!</div>
    <div class="co-success-sub">${vc>1?`Your ${vc} orders have`:'Your order has'} been placed successfully.<br>The restaurant${vc>1?'s are':'is'} preparing your food.</div>
    <div class="co-success-id">Order ${orderId}</div>
    <div class="co-success-items">${rows}</div>
    <div style="width:100%;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border-light);padding:9px 13px;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <span style="font-size:0.78rem;color:var(--dim);">Total charged</span>
      <span style="font-size:0.92rem;font-weight:800;color:var(--text);">R${total.toFixed(2)}</span>
    </div>
    <div style="width:100%;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border-light);padding:9px 13px;display:flex;gap:8px;align-items:center;">
      <i data-lucide="clock" style="width:14px;height:14px;color:var(--accent);flex-shrink:0;"></i>
      <span style="font-size:0.78rem;color:var(--text);">Estimated delivery: <strong>25–40 min</strong></span>
    </div>
  </div>`;
  footer.innerHTML=`<button class="co-track-btn" onclick="window.location.href='index.html'">Track Order</button><button class="co-done-btn" onclick="window.location.href='index.html'" style="margin-top:8px;">Back to Home</button>`;
}

window.handleCheckout = ()=>{
  const btn=document.getElementById('coPlaceBtn');
  if(btn){btn.disabled=true;btn.innerHTML='<i data-lucide="loader-2" style="animation:spin 1s linear infinite;width:17px;height:17px;"></i> Placing order…';lucide.createIcons();}
  setTimeout(()=>{coAnimDir='forward';coStep=2;renderCoStep();lucide.createIcons();},1200);
};

// INIT
document.addEventListener('DOMContentLoaded',()=>{
  lucide.createIcons();
  renderCoStep();
});
</script>
</body>
</html>
